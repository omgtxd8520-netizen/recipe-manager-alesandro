name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
      - name: Lint (flake8)
        run: |
          python -m pip install flake8
          flake8 --max-line-length=120 || true
      - name: Wait for Mongo
        run: |
          python - <<'PY'
import socket, time
for i in range(30):
    try:
        s = socket.socket()
        s.settimeout(1)
        s.connect(('localhost', 27017))
        s.close()
        print('mongo ready')
        break
    except Exception:
        time.sleep(1)
else:
    raise SystemExit('mongo not available')
PY
      - name: Run tests (integration + unit)
        env:
          MONGO_URI: mongodb://localhost:27017/recipe_db
        run: |
          pytest -q
